function isOpen(game) { return new Date() < new Date(game.kickoff.getTime() - DEADLINE_OFFSET_MS); }

function calcPoints(gh, ga, rh, ra) {
  gh = parseInt(gh); ga = parseInt(ga); rh = parseInt(rh); ra = parseInt(ra);
  if (gh === rh && ga === ra) return 5;
  const gW = gh > ga ? 'H' : gh < ga ? 'A' : 'D';
  const rW = rh > ra ? 'H' : rh < ra ? 'A' : 'D';
  let pts = 0;
  if (gW === rW) pts += 3;
  else { if (gh === rh) pts += 1; if (ga === ra) pts += 1; }
  return pts;
}

let state = { screen: 'login', user: null, tab: 'jogos', guesses: [], results: {}, users: [], rankData: [] };

function setState(patch) { Object.assign(state, patch); render(); }

function flash(text, type = 'success') {
  const el = document.getElementById('msg');
  if (!el) return;
  el.className = type === 'danger' ? 'msg-danger' : 'msg-success';
  el.textContent = text;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

// Supabase calls
async function dbGetGuesses() {
  const { data } = await sb.from('guesses').select('*');
  return data || [];
}
async function dbGetResults() {
  const { data } = await sb.from('results').select('*');
  const map = {};
  (data || []).forEach(r => { map[r.game_id] = { home: r.home, away: r.away }; });
  return map;
}
async function dbGetUsers() {
  const { data } = await sb.from('users').select('*');
  return data || [];
}
async function dbUpsertGuess(gameId, email, name, home, away) {
  await sb.from('guesses').upsert({ game_id: gameId, email, name, home, away }, { onConflict: 'game_id,email' });
}
async function dbUpsertResult(gameId, home, away) {
  await sb.from('results').upsert({ game_id: gameId, home, away }, { onConflict: 'game_id' });
}
async function dbDeleteGuess(gameId, email) {
  await sb.from('guesses').delete().eq('game_id', gameId).eq('email', email);
}
async function dbDeleteUser(email) {
  await sb.from('guesses').delete().eq('email', email);
  await sb.from('users').delete().eq('email', email);
}
async function dbUpdateUser(origEmail, name, email, pass) {
  const upd = { name, email };
  if (pass) upd.pass = pass;
  await sb.from('users').update(upd).eq('email', origEmail);
  await sb.from('guesses').update({ email, name }).eq('email', origEmail);
}

function getRanking() {
  const totals = {};
  state.users.forEach(u => { totals[u.email] = { name: u.name, pts: 0 }; });
  state.guesses.forEach(g => {
    const res = state.results[g.game_id];
    const pts = res ? calcPoints(g.home, g.away, res.home, res.away) : 0;
    if (!totals[g.email]) totals[g.email] = { name: g.name, pts: 0 };
    totals[g.email].pts += pts || 0;
  });
  return Object.values(totals).sort((a, b) => b.pts - a.pts);
}

  bindApp();
}

    const deadline = new Date(game.kickoff.getTime() - DEADLINE_OFFSET_MS);
    const deadlineStr = deadline.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' });
    const gh = myGuess ? myGuess.home : '';
    const ga = myGuess ? myGuess.away : '';

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="display:inline-flex;align-items:center;gap:6px;background:var(--brand-light);border-radius:999px;padding:4px 12px;color:var(--brand);font-size:12px;font-weight:500;">

        <div style="font-weight:800;font-size:20px;color:#6b7280;">×</div>
        <div class="flag-wrap">${flagSVG(game.away)}<div class="country-name">${game.away}</div></div>
      </div>
      <hr class="divider">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${result ? '10px' : '0'};">
        <span style="font-size:12px;color:#6b7280;">${open ? `Palpites até ${deadlineStr} (30 min antes)` : 'Prazo encerrado'}</span>
      </div>
      ${result ? `<div style="margin-bottom:10px;font-size:13px;padding:8px 12px;background:var(--brand-light);border-radius:8px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--brand-dark);">Resultado: <strong>${result.home} × ${result.away}</strong></span>
        ${myPts !== null ? `<span class="badge-pts">+${myPts} pts</span>` : ''}

      ${!isAdmin ? `
      <div style="margin-top:10px;">

      <div class="row">
        <input type="number" min="0" max="20" class="score-input" id="rh-${game.id}" value="${res.home}" placeholder="0"/>
        <span class="sep">×</span>
        <input type="number" min="0" max="20" class="score-input" id="ra-${game.id}" value="${res.away}" placeholder="0"/>
        <button class="btn-inline" data-save-result="${game.id}">Salvar</button>
      </div>
      ${state.results[game.id] ? `<div style="font-size:12px;color:var(--brand);margin-top:6px;font-weight:500;">✓ Atual: ${game.home} ${res.home} × ${res.away} ${game.away}</div>` : ''}
    </div>`;
  });

  html += `<div style="font-size:14px;font-weight:700;color:var(--brand);margin:20px 0 12px;">Gerenciar palpites</div>`;
  GAMES.forEach(game => {
    const gameGuesses = state.guesses.filter(g => g.game_id === game.id);
    const result = state.results[game.id];
    html += `<div class="card"><div style="font-weight:600;margin-bottom:8px;">${game.home} × ${game.away}</div>`;
    if (gameGuesses.length === 0) {
      html += `<div style="font-size:13px;color:#6b7280;">Nenhum palpite ainda.</div>`;
    } else {
      gameGuesses.forEach(g => {
        const pts = result ? calcPoints(g.home, g.away, result.home, result.away) : null;
        html += `<div class="guess-row">
          <span style="flex:1;">${g.name}</span>
          <span style="margin-right:8px;"><strong>${g.home}</strong> × <strong>${g.away}</strong></span>
          ${pts !== null ? `<span style="color:var(--brand);font-weight:600;margin-right:8px;background:var(--brand-light);border-radius:999px;padding:1px 8px;">+${pts}pts</span>` : '<span style="color:#6b7280;margin-right:8px;">—</span>'}
          <button class="btn-small" data-edit-guess="${game.id}|${g.email}" style="margin-right:4px;">Editar</button>
          <button class="btn-danger" data-del-guess="${game.id}|${g.email}">Excluir</button>
        </div>`;
      });
    }
    html += `</div>`;
  });

  html += `<div style="font-size:14px;font-weight:700;color:var(--brand);margin:20px 0 12px;">Gerenciar usuários</div>`;
  if (state.users.length === 0) {
    html += `<div style="font-size:13px;color:#6b7280;">Nenhum usuário cadastrado.</div>`;
  } else {
    state.users.forEach(u => {
      html += `<div class="card" style="display:flex;justify-content:space-between;align-items:center;">
        <div><div style="font-weight:500;">${u.name}</div><div style="font-size:12px;color:#6b7280;">${u.email}</div></div>
        <div style="display:flex;gap:6px;">
          <button class="btn-small" data-edit-user="${u.email}">Editar</button>
          <button class="btn-danger" data-del-user="${u.email}">Excluir</button>
        </div>
      </div>`;
    });
  }
  return html;
}

// Bind events
function bindLogin() {
  document.getElementById('btn-go-register').onclick = () => setState({ screen: 'register' });
  document.getElementById('btn-go-forgot').onclick = () => setState({ screen: 'forgot' });
  document.getElementById('btn-login').onclick = async () => {
    const email = document.getElementById('l-email').value.trim();
    const pass = document.getElementById('l-pass').value;
    setState({ lastEmail: email });
    if (email === ADMIN_EMAIL && pass === 'verity2026') {
      const [guesses, results, users] = await Promise.all([dbGetGuesses(), dbGetResults(), dbGetUsers()]);
      setState({ screen: 'app', user: { name: 'Dani (Admin)', email: ADMIN_EMAIL }, guesses, results, users, tab: 'jogos' });
      return;
    }
    const { data } = await sb.from('users').select('*').eq('email', email).eq('pass', pass).single();
    if (!data) { flash('E-mail ou senha incorretos.', 'danger'); return; }
    const [guesses, results, users] = await Promise.all([dbGetGuesses(), dbGetResults(), dbGetUsers()]);
    setState({ screen: 'app', user: { name: data.name, email: data.email }, guesses, results, users, tab: 'jogos' });
  };
}

function bindForgot() {
  document.getElementById('btn-back-login').onclick = () => setState({ screen: 'login' });
  document.getElementById('btn-back-login2').onclick = () => setState({ screen: 'login' });
  document.getElementById('btn-check-email').onclick = async () => {
    const email = document.getElementById('f-email').value.trim();
    if (!email) { flash('Informe o e-mail.', 'danger'); return; }
    const { data } = await sb.from('users').select('email').eq('email', email).single();
    if (!data) { flash('E-mail não encontrado.', 'danger'); return; }
    document.getElementById('forgot-step1').style.display = 'none';
    document.getElementById('forgot-step2').style.display = 'block';
    document.getElementById('btn-reset-pass').dataset.email = email;
  };
  document.getElementById('btn-reset-pass').onclick = async (e) => {
    const email = e.target.dataset.email;
    const pass = document.getElementById('f-pass').value;
    const pass2 = document.getElementById('f-pass2').value;
    if (!pass) { flash('Informe a nova senha.', 'danger'); return; }
    if (pass !== pass2) { flash('As senhas não coincidem.', 'danger'); return; }
    await sb.from('users').update({ pass }).eq('email', email);
    flash('Senha atualizada! Faça login.');
    setTimeout(() => setState({ screen: 'login' }), 1500);
  };
}

function bindRegister() {
  document.getElementById('btn-go-login').onclick = () => setState({ screen: 'login' });
  document.getElementById('btn-register').onclick = async () => {
    const name = document.getElementById('r-name').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const pass = document.getElementById('r-pass').value;
    const pass2 = document.getElementById('r-pass2').value;
    if (!name || !email || !pass) { flash('Preencha todos os campos.', 'danger'); return; }
    if (pass !== pass2) { flash('As senhas não coincidem.', 'danger'); return; }
    const { error } = await sb.from('users').insert({ name, email, pass });
    if (error) { flash('E-mail já cadastrado.', 'danger'); return; }
    flash('Cadastro realizado! Faça login.');
    setTimeout(() => setState({ screen: 'login' }), 1500);
  };
}

function bindApp() {
  const isAdmin = state.user.email === ADMIN_EMAIL;

  document.getElementById('btn-logout').onclick = () => setState({ screen: 'login', user: null });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => setState({ tab: btn.dataset.tab });
  });

  // Save guess
  document.querySelectorAll('[data-save-guess]').forEach(btn => {
    btn.onclick = async () => {
      const gameId = parseInt(btn.dataset.saveGuess);
      const game = GAMES.find(g => g.id === gameId);
      if (!isOpen(game)) { flash('Prazo encerrado.', 'danger'); return; }
      const gh = document.getElementById(`gh-${gameId}`).value;
      const ga = document.getElementById(`ga-${gameId}`).value;
      if (gh === '' || ga === '') { flash('Preencha o placar.', 'danger'); return; }
      await dbUpsertGuess(gameId, state.user.email, state.user.name, gh, ga);
      state.guesses = await dbGetGuesses();
      flash('Palpite salvo!'); render();
    };
  });

  // Save result
  document.querySelectorAll('[data-save-result]').forEach(btn => {
    btn.onclick = async () => {
      const gameId = parseInt(btn.dataset.saveResult);
      const rh = document.getElementById(`rh-${gameId}`).value;
      const ra = document.getElementById(`ra-${gameId}`).value;
      if (rh === '' || ra === '') { flash('Preencha o resultado.', 'danger'); return; }
      await dbUpsertResult(gameId, rh, ra);
      state.results = await dbGetResults();
      flash('Resultado salvo!'); render();
    };
  });

  // Delete guess
  document.querySelectorAll('[data-del-guess]').forEach(btn => {
    btn.onclick = async () => {
      const [gameId, email] = btn.dataset.delGuess.split('|');
      if (!confirm(`Excluir palpite de ${email}?`)) return;
      await dbDeleteGuess(parseInt(gameId), email);
      state.guesses = await dbGetGuesses();
      flash('Palpite excluído.'); render();
    };
  });

  // Edit guess
  document.querySelectorAll('[data-edit-guess]').forEach(btn => {
    btn.onclick = async () => {
      const [gameId, email] = btn.dataset.editGuess.split('|');
      const g = state.guesses.find(x => x.game_id === parseInt(gameId) && x.email === email);
      const home = prompt(`Novo placar — ${GAMES.find(x=>x.id===parseInt(gameId)).home} (gols):`, g.home);
      if (home === null) return;
      const away = prompt(`Novo placar — ${GAMES.find(x=>x.id===parseInt(gameId)).away} (gols):`, g.away);
      if (away === null) return;
      await dbUpsertGuess(parseInt(gameId), email, g.name, home, away);
      state.guesses = await dbGetGuesses();
      flash('Palpite atualizado.'); render();
    };
  });

  // Delete user
  document.querySelectorAll('[data-del-user]').forEach(btn => {
    btn.onclick = async () => {
      const email = btn.dataset.delUser;
      if (!confirm(`Excluir usuário ${email} e todos os seus palpites?`)) return;
      await dbDeleteUser(email);
      state.users = await dbGetUsers();
      state.guesses = await dbGetGuesses();
      flash('Usuário excluído.'); render();
    };
  });

  // Edit user
  document.querySelectorAll('[data-edit-user]').forEach(btn => {
    btn.onclick = async () => {
      const origEmail = btn.dataset.editUser;
      const u = state.users.find(x => x.email === origEmail);
      const name = prompt('Novo nome:', u.name);
      if (!name) return;
      const email = prompt('Novo e-mail:', u.email);
      if (!email) return;
      const pass = prompt('Nova senha (deixe em branco para manter):', '');
      await dbUpdateUser(origEmail, name, email, pass || null);
      state.users = await dbGetUsers();
      state.guesses = await dbGetGuesses();
      flash('Usuário atualizado.'); render();
    };
  });
}

// Init
window.onerror = function(msg, src, line) {
  document.getElementById('app').innerHTML = `<div style="padding:2rem;color:red;font-family:monospace;font-size:13px;">Erro JS: ${msg}<br>Linha: ${line}</div>`;
};
if (typeof supabase === 'undefined') {
  document.getElementById('app').innerHTML = `<div style="padding:2rem;color:red;font-family:sans-serif;">Erro: biblioteca Supabase não carregou. Verifique sua conexão.</div>`;
} else {
  render();
}
</script>
